<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DXB99 Matchup Generator</title>

<link rel="stylesheet" href="style.css?v=2">

</head>

<body>


<!-- LOADING SCREEN -->

<div id="loadingScreen">

<div id="logoBg"></div> <!-- 🔥 NEW LINE -->

<div id="logo"></div>

<div class="loadingText">
LOADING<span class="dots"></span>
</div>

</div>


<!-- MAIN APP -->

<div id="app" class="hidden">


<header>

<h1>DXB99 MATCHUP GENERATOR</h1>

<div class="tabs">

<button onclick="showTab('matchupTab', this)" class="tabButton active">
<span class="tabIcon">🆚</span>
MATCHUP
</button>

<button onclick="showTab('generatorTab', this)" class="tabButton">
<span class="tabIcon">🔀</span>
GENERATOR
</button>

<button onclick="openHistoryTab(this)" class="tabButton">
<span class="tabIcon">📜</span>
HISTORY
</button>

<button onclick="openAdminTab(this)" class="tabButton">
<span class="tabIcon">🔐</span>
ADMIN
</button>

</div>

</header>

<!-- MATCHUP TAB -->

<div id="matchupTab" class="tabContent active">

<h2>CURRENT MATCHUP</h2>

<div id="matchupContent">

NO MATCHUP YET

<br><br>

CLICK GENERATOR TO GET STARTED

</div>

<div id="matchCountdown"></div>

</div>


<!-- GENERATOR TAB -->

<div id="generatorTab" class="tabContent">

<h2>MATCH MAKER</h2>

<select id="matchMakerSelect"></select>

<h2>PLAYERS (<span id="selectedPlayerCount">0</span> SELECTED)</h2>

<div class="playerSort">

Sort by:

<select id="playerSort">

<option value="skill">Level</option>

<option value="alpha">Name</option>

</select>

</div>

<div id="playersCheckboxes"></div>

<button id="generateButton">

GENERATE MATCHUP

</button>

<div class="generatorFilters">

<div class="radioRow">

<label><input type="radio" name="gapFilter" value="all" checked> All options</label>

<label><input type="radio" name="gapFilter" value="0"> Difference 0</label>

<label><input type="radio" name="gapFilter" value="1"> Difference 1</label>

<label><input type="radio" name="gapFilter" value="2"> Difference 2</label>

<label><input type="radio" name="gapFilter" value="3"> Difference 3</label>

<label><input type="radio" name="gapFilter" value="4"> Difference 4</label>

</div>

<div class="blitzToggle" style="display:none;">

<label>
<input type="checkbox" id="blitzToggle">
<span class="blitzText">⚡ Only show recommended BLITZ matchup/s for uneven teams! (if available)</span>
</label>

</div>

</div>

<div id="generatedMatchups"></div>

</div>

<!-- HISTORY TAB -->

<div id="historyTab" class="tabContent">

<h2>MATCH HISTORY</h2>

<div class="historyControls">

Sort by:

<select id="historySort">

<option value="newest">Newest</option>

<option value="maker">Match Maker A-Z</option>

</select>

<button id="clearHistoryBtn" class="btn btn-red">CLEAR HISTORY</button>

</div>

<div id="historyList"></div>

</div>

<!-- ADMIN TAB -->

<div id="adminTab" class="tabContent">

<h2>ADMIN</h2>

<div class="adminControls">

<button id="addPlayer" class="btn btn-blue">ADD PLAYER</button>

<span id="playerCount">Players: 0</span>

<button id="savePlayers" class="btn btn-green">SAVE</button>

</div>


<table id="adminTable">

<thead>

<tr>

<th>Name</th>

<th>Skill</th>

<th>Remove</th>

<th>Reset PIN</th>

<th>Status</th>

</tr>

</thead>

<tbody>

</tbody>

</table>

</div>


</div>


<script src="script.js?v=2"></script>


<script>

function showTab(tab, btn){

document.querySelectorAll(".tabContent").forEach(x=>x.classList.remove("active"));

document.querySelectorAll(".tabButton").forEach(x=>x.classList.remove("active"));

document.getElementById(tab).classList.add("active");

if(btn) btn.classList.add("active");

}

</script>

<div id="generatingOverlay">
<div class="generatingBox">
<div class="spinner"></div>
<div class="generatingText">
GENERATING<span class="dots"></span>
</div>
</div>
</div>

<!-- SAVING OVERLAY (SEPARATE) -->

<div id="savingMatchOverlay">
<div class="generatingBox">
<div class="spinner"></div>
<div class="generatingText">
SAVING<span class="dots"></span>
</div>
</div>
</div>

<div id="historyLoadingOverlay">

<div class="generatingBox">

<div class="spinner"></div>

<div class="generatingText">
LOADING<span class="dots"></span>
</div>

</div>

</div>


<div id="clearHistoryOverlay">

<div class="generatingBox">

<div class="spinner"></div>

<div class="generatingText">
CLEARING HISTORY<span class="dots"></span>
</div>

</div>

</div>

<div id="savingOverlay">

<div class="generatingBox">

<div class="spinner"></div>

<div class="generatingText">
SAVING<span class="dots"></span>
</div>

</div>

</div>

</body>
</html>
