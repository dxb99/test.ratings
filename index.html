<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DXB99 Matchup Generator</title>

<link rel="stylesheet" href="style.css">

</head>

<body>


<!-- LOADING SCREEN -->

<div id="loadingScreen">

<img src="DXB99MATCHUP.png" id="logo">

<div class="loadingText">

LOADING<span class="dots"></span>

</div>

</div>


<!-- MAIN APP -->

<div id="app" class="hidden">


<header>

<h1>DXB99 MATCHUP GENERATOR</h1>

<div class="tabs">

<button onclick="showTab('matchupTab')" class="tabButton active">MATCHUP</button>

<button onclick="showTab('generatorTab')" class="tabButton">GENERATOR</button>

<button onclick="showTab('historyTab')" class="tabButton">HISTORY</button>

<button onclick="showTab('adminTab')" class="tabButton">ADMIN</button>

</div>

</header>


<!-- MATCHUP TAB -->

<div id="matchupTab" class="tabContent active">

<h2>CURRENT MATCHUP</h2>

<div id="matchupContent">

NO MATCHUP YET

<br><br>

CLICK GENERATOR TO GET STARTED

</div>

</div>


<!-- GENERATOR TAB -->

<div id="generatorTab" class="tabContent">

<h2>MATCH MAKER</h2>

<select id="matchMakerSelect"></select>


<h2>PLAYERS</h2>

<div id="playersCheckboxes"></div>


<button id="generateButton">

GENERATE MATCHUP

</button>


<div id="generatedMatchups"></div>

</div>


<!-- HISTORY TAB -->

<div id="historyTab" class="tabContent">

<h2>MATCH HISTORY</h2>

<div id="historyList"></div>

</div>


<!-- ADMIN TAB -->

<div id="adminTab" class="tabContent">

<h2>ADMIN</h2>

<div class="adminControls">

<button id="addPlayer">ADD PLAYER</button>

<span id="playerCount">Players: 0</span>

<button id="savePlayers">SAVE</button>

</div>


<table id="adminTable">

<thead>

<tr>

<th>Name</th>

<th>Skill</th>

<th>Remove</th>

<th>Reset PIN</th>

<th>Status</th>

</tr>

</thead>

<tbody>

</tbody>

</table>

</div>


</div>


<script src="script.js"></script>


<script>

function showTab(tab){

document.querySelectorAll(".tabContent").forEach(x=>x.classList.remove("active"));

document.querySelectorAll(".tabButton").forEach(x=>x.classList.remove("active"));

document.getElementById(tab).classList.add("active");

event.target.classList.add("active");

}

</script>


</body>

</html>
